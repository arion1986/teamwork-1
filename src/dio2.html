<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script src="https://cdn.tailwindcss.com"></script>
   <title>Header Task</title>
</head>

<body class="bg-gray-100">

   <header class="bg-[#5c5c5c] text-white px-4 py-3 max-w-[1300px] m-auto">
      <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">

         <div class="flex items-center flex-1 gap-6">
            <div class="flex items-center gap-2 shrink-0">
               <span class="text-xl font-bold tracking-tight hidden sm:block"><a href="../index.html"><img
                        src="../forimg/Logo (9).png" alt=""></a></span>
            </div>

            <div class="relative hidden md:block w-full max-w-md">
               <input type="text" placeholder="Search bar"
                  class="w-full bg-transparent border border-gray-400 rounded-lg py-1.5 px-4 outline-none focus:border-white transition-colors">
               <div class="absolute right-3 top-2.5 text-gray-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
               </div>
            </div>
         </div>

         <nav class="flex items-center gap-4 lg:gap-8">
            <div class="hidden lg:flex items-center gap-6 text-sm font-medium">
               <button class="flex items-center gap-1 transition-all active:scale-95 hover:opacity-80">
                  <a href="./src/simple.html"> Category</a>

                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                     <path fill-rule="evenodd"
                        d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                  </svg>
               </button>
               <a href="#" class="whitespace-nowrap"><a href="./src/senopage3.html">Become an Mentor</a></a>
            </div>

            <div class="flex items-center gap-2 sm:gap-4">
               <button
                  class="border border-gray-400 rounded-md px-4 py-1.5 text-sm font-medium hover:bg-white/10 transition-all active:scale-95 hover:shadow-md">
                  <a href="./dio.html">Login</a>
               </button>
               <button
                  class="bg-[#ff1e82] hover:bg-[#e61a75] text-white rounded-md px-4 py-1.5 text-sm font-medium transition-all active:scale-95 hover:shadow-lg hover:-translate-y-0.5">
                  <a href="#">Sign Up</a>
               </button>

               <button class="lg:hidden p-1 transition-transform active:scale-90">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                  </svg>
               </button>
            </div>
         </nav>

      </div>

      <div class="mt-3 md:hidden">
         <div class="relative w-full">
            <input type="text" placeholder="Search bar"
               class="w-full bg-transparent border border-gray-400 rounded-lg py-2 px-4 outline-none">
         </div>
      </div>
   </header>

</body>

</html>
